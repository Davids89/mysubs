services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mysubs
      POSTGRES_USER: mysubs
      POSTGRES_PASSWORD: mysubs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mysubs -d mysubs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: pnpm --filter @mysubs/backend dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://mysubs:mysubs@db:5432/mysubs?schema=public
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_app_node_modules:/app/apps/backend/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  backend_app_node_modules:
